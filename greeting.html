<!DOCTYPE html>
<!-- Объявляем тип документа HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы, указываем язык — русский -->
<head>
  <!-- Начало заголовочной части страницы -->
  <meta charset="UTF-8">
  <!-- Устанавливаем кодировку UTF-8 для поддержки русских символов -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Настраиваем viewport для корректного отображения на мобильных -->
  <title>Приветствие</title>
  <!-- Заголовок страницы, отображается во вкладке браузера -->
  
  <style>
    /* Открываем блок внутренних CSS-стилей */
    
    body {
      /* Стили для всего тела страницы */
      background: linear-gradient(135deg, #667eea, #764ba2);
      /* Градиентный фон: угол 135 градусов, цвета от #667eea до #764ba2 */
      color: white;
      /* Цвет текста — белый */
      font-family: Arial, sans-serif;
      /* Шрифт: сначала Arial, если нет — любой sans-serif */
      margin: 0;
      /* Убираем внешние отступы у страницы */
      min-height: 100vh;
      /* Минимальная высота — 100% высоты экрана (vh = viewport height) */
      display: flex;
      /* Включаем гибкую вёрстку (Flexbox) для центрирования содержимого */
      flex-direction: column;
      /* Направление элементов — вертикально (колонка) */
      align-items: center;
      /* Выравнивание элементов по горизонтали — по центру */
      justify-content: center;
      /* Выравнивание элементов по вертикали — по центру */
    }
    
    .greeting {
      /* Стили для блока приветствия */
      background: rgba(255, 255, 255, 0.1);
      /* Полупрозрачный белый фон: rgba(красный, зелёный, синий, прозрачность) */
      padding: 40px 60px;
      /* Внутренние отступы: 40px сверху/снизу, 60px слева/справа */
      border-radius: 20px;
      /* Скруглённые углы — 20 пикселей */
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      /* Тень у блока: 0 по X, 8px по Y, 32px размытие, полупрозрачный чёрный */
      text-align: center;
      /* Выравнивание текста — по центру */
    }
    
    h1 {
      /* Стили для заголовка первого уровня */
      font-size: 3rem;
      /* Размер шрифта — 3rem (в 3 раза больше базового размера) */
      margin: 0;
      /* Убираем все отступы у заголовка */
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      /* Тень у текста: 2px по X, 2px по Y, 4px размытие */
    }
    
  </style>
  <!-- Конец блока CSS-стилей -->
  
</head>
<!-- Конец заголовочной части -->
<body>
  <!-- Начало тела страницы — здесь видимый контент -->
  
  <div class="greeting" id="greetingBlock">
    <!-- Блок div с классом greeting для стилизации и id для доступа из JavaScript -->
    <h1 id="greetingText">Загрузка...</h1>
    <!-- Заголовок с персональным приветствием, id нужен для изменения текста -->
  </div>
  <!-- Конец блока приветствия -->
  
  <script>
    // Открываем блок JavaScript-кода
    
    // Спрашиваем имя пользователя через диалоговое окно
    const userName = prompt('Как тебя зовут?', '');
    // prompt — функция для показа диалогового окна с полем ввода
    // Первый аргумент — текст вопроса, второй — значение по умолчанию (пустая строка)
    // Результат сохраняется в переменную userName
    
    // Находим элемент с приветствием по его id
    const greetingText = document.getElementById('greetingText');
    // document.getElementById — метод для поиска элемента по уникальному идентификатору
    
    // Проверяем, введено ли имя
    if (userName && userName.trim() !== '') {
      // if — условная конструкция
      // userName && — проверяем, что имя не null и не пустая строка
      // userName.trim() !== '' — trim() удаляет пробелы по краям, проверяем что не пусто
      greetingText.textContent = `Привет, ${userName}!`;
      // textContent — свойство для изменения текстового содержимого элемента
      // `Привет, ${userName}!` — шаблонная строка с подстановкой имени
    } else {
      // else — выполняется, если условие if не выполнено (имя не введено)
      greetingText.textContent = 'Привет, незнакомец!';
      // Показываем стандартное приветствие для анонимного пользователя
    }
    
  </script>
  <!-- Конец блока JavaScript-кода -->
  
</body>
<!-- Конец тела страницы -->
</html>
<!-- Закрываем корневой элемент html -->
