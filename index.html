<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С 8 Марта!</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fecfef, #ffecd2);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      max-width: 700px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 4rem;
      color: #e91e63;
      margin: 0 0 30px 0;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .greeting {
      font-size: 1.5rem;
      line-height: 1.8;
      color: #c2185b;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
      margin: 0;
      font-style: italic;
    }

    .flowers {
      font-size: 4rem;
      margin: 20px 0;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    .heart {
      font-size: 3rem;
      color: #e91e63;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      10%, 30% { transform: scale(1.1); }
      20%, 40% { transform: scale(1); }
    }

    .petal {
      position: absolute;
      width: 20px;
      height: 20px;
      background: linear-gradient(45deg, #ff69b4, #ffb6c1);
      border-radius: 50% 0 50% 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌷 С 8 Марта! 🌷</h1>
    <div class="flowers">💐 🌸 💐</div>
    <p class="greeting">
      Дорогие женщины! <br>
      Вы — украшение этого мира, <br>
      источник тепла, нежности и красоты. <br>
      Пусть каждый день приносит радость, <br>
      глаза сияют от счастья, <br>
      а сердце наполняется любовью. <br>
      Будьте любимы, желанны и неповторимы! <br>
      Весеннего настроения, улыбок и цветов! <br>
      <span class="heart">💖</span> <br>
      С праздником! <br>
      <span class="heart">💖</span>
    </p>
    <div class="flowers">🌹 🌺 🌻</div>
  </div>

  <script>
    // Создаём падающие лепестки
    function createPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = (Math.random() * 3 + 5) + 's';
      petal.style.opacity = Math.random();
      document.body.appendChild(petal);

      // Удаляем лепесток после падения
      setTimeout(() => {
        petal.remove();
      }, 8000);
    }

    // Создаём лепестки каждые 300мс
    setInterval(createPetal, 300);
  </script>
</body>
</html>
